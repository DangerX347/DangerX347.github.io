project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - projects/list/business-strategy-project.qmd
    - projects/list/coding-visualisation-project.qmd
    - projects/list/econometrics-project.qmd
    - projects/list/macroeconomic-project.qmd
    - projects/list/ml-project.qmd
    - projects/list/reflection-project.qmd
    - projects/list/soc-bitcoin-project.qmd

website:
  title: ""
  favicon: assets/images/favicon.png
  navbar:
    pinned: true
    logo: assets/images/logo.png
    left:
      - href: "index.qmd#about-me"
        text: "![](/assets/images/icon-about.png){.nav-icon} About Me"
      - href: "index.qmd#achievements"
        text: "![](/assets/images/icon-achievements.png){.nav-icon} Achievements"
      - href: "index.qmd#projects"
        text: "![](/assets/images/icon-projects.png){.nav-icon} Projects"
      - href: "index.qmd#hobbies"
        text: "![](/assets/images/icon-hobbies.png){.nav-icon} Hobbies"
      - href: "index.qmd#contact"
        text: "![](/assets/images/icon-contact.png){.nav-icon} Contact"
    right:
      - icon: file-earmark-pdf
        href: assets/cv.pdf
        text: CV
        target: _blank
      - icon: linkedin
        href: https://www.linkedin.com/in/daniel-vala-0a6b132b9
        target: _blank
      - icon: envelope
        href: mailto:daniel.vala2@mail.dcu.ie
      - icon: github
        href: https://github.com/DangerX347/
        target: _blank
  page-footer:
    right: "Built with [Quarto](https://quarto.org)"
    center: "Copyright 2026 Daniel Vala. All rights reserved."
  search: false

format:
  html:
    theme:
      light:
        - cosmo
        - styles.scss
      dark:
        - cosmo
        - styles.scss
        - styles-dark.scss
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: false
    code-copy: true
    anchor-sections: true
    smooth-scroll: true
    mainfont: "Inter"
    include-after-body: scrollspy.html

execute:
  freeze: auto
